<!-- 引擎核心逻辑 -->
    <script>
        const etfLibrary = [
            { id: 'SCHD', name: '高息质量', type: '收入', defaultWeight: 20, color: 'blue', 
              ws: `<div class="tooltip-title"><span>SCHD</span><span class="text-gray-400 font-normal">成立: 2011年</span></div>
                   <div class="mb-2"><span class="font-bold text-white">【介绍】</span>严格跟踪道琼斯美国股息100指数。并非简单追求高息，而是通过四大基本面指标，层层筛选连续10年分红的优质企业。</div>
                   <div class="mb-2"><span class="font-bold text-emerald-400">【优势】</span>成分股财务极为健康，具备强劲下行保护能力，股息增长长期跑赢通胀。</div>
                   <div class="mb-2"><span class="font-bold text-red-400">【局限】</span>极度缺乏高成长的科技股，在狂热牛市中会显著跑输大盘。</div>
                   <div><span class="font-bold text-blue-400">【买入逻辑】</span>组合的“现金流压舱石”，提供高确定性且初始占比较高的股息收入。</div>` },
            { id: 'DGRO', name: '股息成长', type: '收入', defaultWeight: 10, color: 'blue',
              ws: `<div class="tooltip-title"><span>DGRO</span><span class="text-gray-400 font-normal">成立: 2014年</span></div>
                   <div class="mb-2"><span class="font-bold text-white">【介绍】</span>专注具有5年以上股息增长历史的公司，强制要求派息率低于75%，同时剔除收益率最高的前10%规避“高息陷阱”。</div>
                   <div class="mb-2"><span class="font-bold text-emerald-400">【优势】</span>捕获具备持续造血能力的科技巨头（如微软、苹果），实现双击。</div>
                   <div class="mb-2"><span class="font-bold text-red-400">【局限】</span>初始股息率相对偏低（约2%），需要较长的时间周期让复利发酵。</div>
                   <div><span class="font-bold text-blue-400">【买入逻辑】</span>长期抗通胀引擎，确保未来的现金流购买力逐年阶梯上升。</div>` },
            { id: 'VPU', name: '公用事业', type: '收入', defaultWeight: 5, color: 'blue',
              ws: `<div class="tooltip-title"><span>VPU</span><span class="text-gray-400 font-normal">成立: 2004年</span></div>
                   <div class="mb-2"><span class="font-bold text-white">【介绍】</span>专门投资受政府监管的美国电力、天然气和水务等垄断公用事业公司。</div>
                   <div class="mb-2"><span class="font-bold text-emerald-400">【优势】</span>极强的逆周期防御属性，收入由监管电价保障，与宏观经济衰退关联度极低。</div>
                   <div class="mb-2"><span class="font-bold text-red-400">【局限】</span>对利率敏感，在加息周期表现疲软；完全缺乏进攻性。</div>
                   <div><span class="font-bold text-blue-400">【买入逻辑】</span>防御避险配置，在系统性崩盘时提供稳定的股息和心理支撑。</div>` },
            { id: 'VOO', name: '标普500', type: '收入', defaultWeight: 15, color: 'slate',
              ws: `<div class="tooltip-title"><span>VOO</span><span class="text-gray-400 font-normal">成立: 2010年</span></div>
                   <div class="mb-2"><span class="font-bold text-white">【介绍】</span>按市值加权跟踪标普500指数，覆盖美国最具代表性的500家跨国企业。</div>
                   <div class="mb-2"><span class="font-bold text-emerald-400">【优势】</span>极致的分散与优胜劣汰机制，费率极低（0.03%），代表最纯正的市场贝塔收益。</div>
                   <div class="mb-2"><span class="font-bold text-red-400">【局限】</span>前十大科技巨头集中度过高（达30%以上），整体分红率被拉低。</div>
                   <div><span class="font-bold text-blue-400">【买入逻辑】</span>作为组合的总市值中枢，不押注单一风格，平抑极端波动。</div>` },
            { id: 'QQQM', name: '纳指100', type: '成长', defaultWeight: 25, color: 'red',
              ws: `<div class="tooltip-title"><span>QQQM</span><span class="text-gray-400 font-normal">成立: 2020年</span></div>
                   <div class="mb-2"><span class="font-bold text-white">【介绍】</span>跟踪纳斯达克100指数，包含上市市值最大的100家非金融类创新企业。</div>
                   <div class="mb-2"><span class="font-bold text-emerald-400">【优势】</span>深度绑定科技革命，长期展现极强的进攻性和超额收益能力。</div>
                   <div class="mb-2"><span class="font-bold text-red-400">【局限】</span>波动率极大，在估值泡沫破裂期（如2000、2022年）会遭遇毁灭性回撤。</div>
                   <div><span class="font-bold text-blue-400">【买入逻辑】</span>绝对的成长半区核心，承担拉升整个资产包长期总市值的重任。</div>` },
            { id: 'SMH', name: '半导体', type: '成长', defaultWeight: 25, color: 'red',
              ws: `<div class="tooltip-title"><span>SMH</span><span class="text-gray-400 font-normal">成立: 2011年</span></div>
                   <div class="mb-2"><span class="font-bold text-white">【介绍】</span>集中持仓全球半导体产业链最核心的前25大龙头企业，单股上限达20%+。</div>
                   <div class="mb-2"><span class="font-bold text-emerald-400">【优势】</span>爆发力冠绝美股，处于AI、云计算和智能硬件革命的最底层刚需环节。</div>
                   <div class="mb-2"><span class="font-bold text-red-400">【局限】</span>高周期行业，受库存与地缘政治影响深远，回撤惨烈。</div>
                   <div><span class="font-bold text-blue-400">【买入逻辑】</span>组合中最尖锐的战术长矛，利用高弹性博取最高额的阿尔法收益。</div>` },
            { id: 'VGT', name: '纯净科技', type: '成长', defaultWeight: 0, color: 'red',
              ws: `<div class="tooltip-title"><span>VGT</span><span class="text-gray-400 font-normal">成立: 2004年</span></div>
                   <div class="mb-2"><span class="font-bold text-white">【介绍】</span>深度覆盖全美IT行业。依GICS标准不含Alphabet、Meta及亚马逊、特斯拉。</div>
                   <div class="mb-2"><span class="font-bold text-emerald-400">【优势】</span>纯度极高，专注软件服务与硬件制造，费率极低（0.10%）。</div>
                   <div class="mb-2"><span class="font-bold text-red-400">【局限】</span>行业定义死板，错过了数家具备强科技属性的万亿级互联网巨头。</div>
                   <div><span class="font-bold text-blue-400">【买入逻辑】</span>灵活替代或补充QQQM，强化对纯粹软硬件领域的垂直配置。</div>` }
        ];

        let state = {
            isDrip: false, capital: 3000000, annualAdd: 0, startYear: 2000, 
            currentYear: new Date().getFullYear(), portfolio: {},
            viewVal: 'yearly', viewDiv: 'yearly',
            forecastMode: 'historical', forecastYears: 10
        };

        let cachedChartData = { yearly: {}, monthly: {} };
        let trueHistoricalCagr = 0;

        etfLibrary.forEach(etf => { if (etf.defaultWeight > 0) state.portfolio[etf.id] = etf.defaultWeight; });
        if (typeof proxyDatabase === 'undefined') window.proxyDatabase = { 2000: {SCHD:[0,0.03], SMH:[0,0.01]} };

        function getAssetPerformance(year, id) {
            if (window.proxyDatabase[year] && window.proxyDatabase[year][id]) return window.proxyDatabase[year][id];
            return [0.10, 0.02];
        }

        function renderEtfGrid() {
            const grid = document.getElementById('etfGrid');
            grid.innerHTML = '';
            etfLibrary.forEach(etf => {
                const isSelected = state.portfolio[etf.id] !== undefined;
                const weight = isSelected ? state.portfolio[etf.id] : 0;
                const colorHex = etf.color === 'red' ? '#e9886e' : (etf.color === 'blue' ? '#1e3a8a' : '#1e293b');
                
                grid.innerHTML += `
                    <div class="border rounded-lg p-3 bg-white etf-card ${isSelected ? 'selected' : ''}" onclick="toggleEtf('${etf.id}')">
                        <div class="flex justify-between items-center mb-2">
                            <div class="flex items-center space-x-2">
                                <input type="checkbox" class="etf-checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleEtf('${etf.id}')">
                                <h3 class="font-bold text-lg" style="color: ${isSelected ? colorHex : '#6b7280'}">${etf.id}</h3>
                            </div>
                            <div class="veteran-tooltip relative inline-block cursor-help" onclick="event.stopPropagation()">
                                <div class="flex items-center justify-center w-5 h-5 rounded-full bg-[#d4af37] text-white text-xs font-serif font-bold hover:scale-110 transition shadow">i</div>
                                <div class="tooltip-text">${etf.ws}</div>
                            </div>
                        </div>
                        <div class="flex justify-between items-center bg-gray-50 p-1 rounded" onclick="event.stopPropagation()">
                            <span class="text-xs text-gray-600 font-medium pl-1">初始权重 %</span>
                            <input type="number" min="0" max="100" class="weight-input" value="${weight}" ${!isSelected ? 'disabled' : ''} onchange="updateWeight('${etf.id}', this.value)">
                        </div>
                    </div>`;
            });
        }

        function toggleEtf(id) {
            if (state.portfolio[id] !== undefined) delete state.portfolio[id];
            else state.portfolio[id] = 10;
            renderEtfGrid(); runBacktestEngine();
        }
        function updateWeight(id, value) {
            if (state.portfolio[id] !== undefined) { state.portfolio[id] = parseInt(value) || 0; runBacktestEngine(); }
        }

        const fmtUsdChart = (num) => num >= 1000000 ? '$' + (num/1000000).toFixed(1) + 'M' : '$' + (num/1000).toFixed(0) + 'k';
        const fmtUsd = (num) => num >= 1000000 ? '$' + (num/1000000).toFixed(2) + 'M' : '$' + (num/1000).toFixed(0) + 'k';
        
        ['initialCapital', 'annualContribution', 'startYear'].forEach(id => {
            document.getElementById(id).addEventListener('input', e => {
                let val = parseInt(e.target.value.replace(/,/g, '')) || 0;
                if(id==='startYear') state.startYear = val;
                else state[id === 'initialCapital' ? 'capital' : 'annualAdd'] = val;
                runBacktestEngine();
            });
        });

        document.getElementById('forecastYearsInput').addEventListener('input', e => {
            let val = parseInt(e.target.value) || 10;
            state.forecastYears = val; runBacktestEngine();
        });

        window.setYear = (year) => { document.getElementById('startYear').value = year; state.startYear = year; runBacktestEngine(); };

        document.getElementById('btnIncome').addEventListener('click', e => { state.isDrip = false; e.target.className="bg-black text-white px-5 py-2 rounded-full text-sm font-bold transition"; document.getElementById('btnDrip').className="text-gray-600 px-5 py-2 rounded-full text-sm font-bold transition hover:bg-gray-100"; runBacktestEngine(); });
        document.getElementById('btnDrip').addEventListener('click', e => { state.isDrip = true; e.target.className="bg-black text-white px-5 py-2 rounded-full text-sm font-bold transition"; document.getElementById('btnIncome').className="text-gray-600 px-5 py-2 rounded-full text-sm font-bold transition hover:bg-gray-100"; runBacktestEngine(); });

        window.setForecastMode = function(mode) {
            state.forecastMode = mode;
            ['btnConservative', 'btnHistorical', 'btnOptimistic'].forEach(id => {
                document.getElementById(id).className = "px-3 py-1.5 rounded-md text-xs font-bold transition text-gray-500 hover:text-gray-800 hover:bg-white/50";
            });
            const activeBtn = mode === 'conservative' ? 'btnConservative' : (mode === 'historical' ? 'btnHistorical' : 'btnOptimistic');
            document.getElementById(activeBtn).className = "px-3 py-1.5 rounded-md text-xs font-bold transition bg-white shadow text-gray-800";
            runBacktestEngine();
        };

        const bearMarketPlugin = {
            id: 'bearMarketShading',
            beforeDraw(chart) {
                const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
                if (!x) return;
                const bears = [
                    { y: ['2000','2001','2002'], mStart: '2000-03', mEnd: '2002-10' }, 
                    { y: ['2008','2009'], mStart: '2007-10', mEnd: '2009-03' },         
                    { y: ['2020'], mStart: '2020-02', mEnd: '2020-04' },                
                    { y: ['2022'], mStart: '2022-01', mEnd: '2022-10' }                 
                ];
                ctx.save(); ctx.fillStyle = 'rgba(156, 163, 175, 0.15)'; 
                const labels = chart.data.labels;
                const isMonthly = labels.length > 0 && String(labels[0]).includes('-');

                bears.forEach(b => {
                    let startX, endX;
                    if (isMonthly) {
                        let idxStart = labels.indexOf(b.mStart);
                        let idxEnd = labels.indexOf(b.mEnd);
                        if(idxStart === -1) {
                            let possibleStarts = labels.filter(l => l >= b.mStart && l <= b.mEnd);
                            if(possibleStarts.length > 0) idxStart = labels.indexOf(possibleStarts[0]);
                        }
                        if (idxStart !== -1) {
                            idxEnd = idxEnd !== -1 ? idxEnd : (labels.length - 1);
                            startX = x.getPixelForTick(idxStart);
                            endX = x.getPixelForTick(idxEnd);
                        }
                    } else {
                        let idxStart = labels.indexOf(b.y[0] || b.y);
                        let idxEnd = labels.indexOf(b.y[b.y.length-1] || b.y);
                        if (idxStart !== -1) {
                            startX = x.getPixelForTick(idxStart) - 15;
                            endX = idxEnd !== -1 ? x.getPixelForTick(idxEnd) + 15 : x.getPixelForTick(labels.length-1);
                        }
                    }
                    if (startX && endX) ctx.fillRect(startX, top, Math.max(endX - startX, 10), bottom - top);
                });
                ctx.restore();
            }
        };

        // --- 图表颜值升级：配置高级渐变与柔和视觉 ---
        const valueCtx = document.getElementById('valueChart').getContext('2d');
        let valueGradient = valueCtx.createLinearGradient(0, 0, 0, 200);
        valueGradient.addColorStop(0, 'rgba(16, 185, 129, 0.4)'); // 翠绿半透
        valueGradient.addColorStop(1, 'rgba(16, 185, 129, 0.0)'); // 透明渐隐

        const divCtx = document.getElementById('dividendChart').getContext('2d');
        let divGradient = divCtx.createLinearGradient(0, 0, 0, 200);
        divGradient.addColorStop(0, 'rgba(212, 175, 55, 0.8)'); // 黄金色
        divGradient.addColorStop(1, 'rgba(212, 175, 55, 0.1)'); // 淡黄渐隐

        let valueChart = new Chart(valueCtx, { 
            type: 'line', 
            data: { labels: [], datasets: [{ 
                label: '资产现值', 
                data: [], 
                borderColor: '#10b981', 
                backgroundColor: valueGradient, 
                borderWidth: 2.5, 
                pointRadius: 0, 
                pointHoverRadius: 5,
                pointHoverBackgroundColor: '#ffffff',
                pointHoverBorderColor: '#10b981',
                pointHoverBorderWidth: 2,
                fill: true, 
                tension: 0.3 // 增加丝滑张力
            }] }, 
            plugins: [bearMarketPlugin], 
            options: { 
                responsive: true, 
                plugins: { 
                    legend: { display: false }, 
                    tooltip: { 
                        mode: 'index', intersect: false,
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        titleColor: '#374151', bodyColor: '#10b981', borderColor: '#e5e7eb', borderWidth: 1, padding: 10
                    } 
                }, 
                scales: { 
                    x: { grid: { display: false }, ticks: { autoSkip: true, maxTicksLimit: 12, color: '#9ca3af' } }, 
                    y: { grid: { color: 'rgba(0,0,0,0.03)', borderDash: [5, 5] }, ticks: { callback: fmtUsdChart, color: '#9ca3af' } } 
                }, 
                interaction: { mode: 'nearest', axis: 'x', intersect: false } 
            } 
        });

        let dividendChart = new Chart(divCtx, { 
            type: 'bar', 
            data: { labels: [], datasets: [{ 
                label: '现金流', 
                data: [], 
                backgroundColor: divGradient,
                hoverBackgroundColor: '#d4af37',
                borderRadius: 3 // 圆角柱状图
            }] }, 
            options: { 
                responsive: true, 
                plugins: { 
                    legend: { display: false },
                    tooltip: { 
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        titleColor: '#374151', bodyColor: '#d4af37', borderColor: '#e5e7eb', borderWidth: 1, padding: 10
                    }
                }, 
                scales: { 
                    x: { grid: { display: false }, ticks: { autoSkip: true, maxTicksLimit: 12, color: '#9ca3af' } }, 
                    y: { grid: { color: 'rgba(0,0,0,0.03)', borderDash: [5, 5] }, ticks: { callback: fmtUsdChart, color: '#9ca3af' } } 
                } 
            } 
        });

        window.setChartMode = function(target, mode) {
            if (target === 'value') {
                state.viewVal = mode;
                document.getElementById('btnValYear').className = mode==='yearly' ? 'chart-toggle-btn chart-toggle-active' : 'chart-toggle-btn chart-toggle-inactive';
                document.getElementById('btnValMonth').className = mode==='monthly' ? 'chart-toggle-btn chart-toggle-active' : 'chart-toggle-btn chart-toggle-inactive';
                valueChart.data.labels = cachedChartData[mode].labels;
                valueChart.data.datasets[0].data = cachedChartData[mode].value;
                valueChart.update();
            } else {
                state.viewDiv = mode;
                document.getElementById('btnDivYear').className = mode==='yearly' ? 'chart-toggle-btn chart-toggle-active' : 'chart-toggle-btn chart-toggle-inactive';
                document.getElementById('btnDivMonth').className = mode==='monthly' ? 'chart-toggle-btn chart-toggle-active' : 'chart-toggle-btn chart-toggle-inactive';
                dividendChart.data.labels = cachedChartData[mode].labels;
                dividendChart.data.datasets[0].data = cachedChartData[mode].div;
                dividendChart.update();
            }
        };

        function runBacktestEngine() {
            let totalWeight = 0;
            for (const w of Object.values(state.portfolio)) totalWeight += w;
            if (totalWeight === 0) totalWeight = 100;

            let assetBuckets = {};
            for (const [id, weight] of Object.entries(state.portfolio)) {
                assetBuckets[id] = state.capital * (weight / totalWeight);
            }

            let yLabels = [], yValue = [], yDiv = [];
            let mLabels = [], mValue = [], mDiv = [];
            
            let cumulativeDiv = 0;
            let currentCapitalInjected = state.capital;
            let historyTableHtml = '';
            let prevTotalAsset = state.capital;
            let indexValue = 1.0;

            for(let y = state.startYear; y <= state.currentYear; y++) {
                
                if (y > state.startYear) currentCapitalInjected += state.annualAdd;
                let startOfYearAsset = prevTotalAsset + (y > state.startYear ? state.annualAdd : 0);

                let currentYearTotalAsset = 0;
                let currentYearDiv = 0;
                let weightSum = 0;
                for (const val of Object.values(assetBuckets)) weightSum += val;
                
                let yearCapReturn = 0;
                let yearDivYield = 0;

                for (const id of Object.keys(assetBuckets)) {
                    let [capReturn, divYield] = getAssetPerformance(y, id);
                    
                    let w = assetBuckets[id] / weightSum;
                    yearCapReturn += capReturn * w;
                    yearDivYield += divYield * w;

                    if (y > state.startYear) assetBuckets[id] += state.annualAdd * (state.portfolio[id] / totalWeight);
                    
                    // --- 核心数学修复点 ---
                    // 股息必须基于【资本暴涨发生前】的本金基础来结算
                    let baseAssetForDividend = assetBuckets[id]; 
                    
                    assetBuckets[id] = assetBuckets[id] * (1 + capReturn);
                    
                    // 基于未暴涨的本金计算当年股息，完美消除 1999 年由于暴涨导致的股息复合错配估值
                    let div = baseAssetForDividend * divYield; 
                    currentYearDiv += div;

                    if (state.isDrip) assetBuckets[id] += div;
                    currentYearTotalAsset += assetBuckets[id];
                }
                
                indexValue *= (1 + yearCapReturn + (state.isDrip ? yearDivYield : 0));

                yLabels.push(y.toString());
                yValue.push(currentYearTotalAsset);
                yDiv.push(currentYearDiv);
                cumulativeDiv += currentYearDiv;
                
                let ratio = Math.pow(currentYearTotalAsset / startOfYearAsset, 1/12);
                let currentMonthAsset = startOfYearAsset;
                
                for(let m=1; m<=12; m++) {
                    currentMonthAsset *= ratio;
                    mLabels.push(y + '-' + String(m).padStart(2, '0'));
                    mValue.push(currentMonthAsset);
                    if (m % 3 === 0) mDiv.push(currentYearDiv / 4);
                    else mDiv.push(0);
                }
                prevTotalAsset = currentYearTotalAsset;

                let yoc = (currentYearDiv / currentCapitalInjected) * 100;
                historyTableHtml += `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                        <td class="py-2 px-4 text-gray-800">${y}</td>
                        <td class="py-2 px-4 font-semibold text-gray-700">${fmtUsd(currentYearTotalAsset)}</td>
                        <td class="py-2 px-4 font-semibold text-[#d4af37]">${fmtUsd(currentYearDiv)}</td>
                        <td class="py-2 px-4 text-blue-600">${fmtUsd(cumulativeDiv)}</td>
                        <td class="py-2 px-4 font-bold ${yoc >= 10 ? 'text-red-500' : 'text-emerald-600'}">${yoc.toFixed(2)}%</td>
                    </tr>
                `;
            }

            cachedChartData.yearly = { labels: yLabels, value: yValue, div: yDiv };
            cachedChartData.monthly = { labels: mLabels, value: mValue, div: mDiv };

            let finalValue = yValue[yValue.length - 1] || 0;
            let finalDiv = yDiv[yDiv.length - 1] || 0;
            let years = state.currentYear - state.startYear + 0.5;
            let totalIn = currentCapitalInjected;
            
            trueHistoricalCagr = Math.pow(indexValue, 1/years) - 1;
            
            document.getElementById('valPresent').textContent = fmtUsd(finalValue);
            document.getElementById('valPresentSub').textContent = `真金白银投入 ${fmtUsd(totalIn)}`;
            document.getElementById('valCagr').textContent = `+${(trueHistoricalCagr*100).toFixed(1)}%`;
            document.getElementById('valSalary').textContent = fmtUsd(finalDiv);
            document.getElementById('valTotalDiv').textContent = fmtUsd(cumulativeDiv);
            document.getElementById('historyRangeTag').textContent = `${state.startYear} - ${state.currentYear}`;
            document.getElementById('historyTableBody').innerHTML = historyTableHtml;

            setChartMode('value', state.viewVal);
            setChartMode('dividend', state.viewDiv);

            let consCagr = trueHistoricalCagr * 0.7; 
            let optCagr = trueHistoricalCagr * 1.2;  

            document.getElementById('btnConservative').textContent = `保守打折 (${(consCagr*100).toFixed(1)}%)`;
            document.getElementById('btnHistorical').textContent = `按历史均值 (${(trueHistoricalCagr*100).toFixed(1)}%)`;
            document.getElementById('btnOptimistic').textContent = `狂热溢价 (${(optCagr*100).toFixed(1)}%)`;

            let terminalDivYield = finalValue > 0 ? (finalDiv / finalValue) : 0.015; 
            
            let forecastCagr;
            if (state.forecastMode === 'conservative') forecastCagr = consCagr;
            else if (state.forecastMode === 'optimistic') forecastCagr = optCagr;
            else forecastCagr = trueHistoricalCagr;

            let forecastRate = 1 + forecastCagr;
            if (state.isDrip) forecastRate = 1 + forecastCagr + terminalDivYield;

            let forecastAsset = finalValue;
            let forecastTotalDiv = cumulativeDiv;
            let forecastCapitalInjected = currentCapitalInjected;
            let forecastTableHtml = '';
            
            document.getElementById('baseYearTag').textContent = state.currentYear;
            let endForecastYear = state.currentYear + state.forecastYears;

            for (let fy = state.currentYear + 1; fy <= endForecastYear; fy++) {
                forecastAsset += state.annualAdd;
                forecastCapitalInjected += state.annualAdd;
                forecastAsset *= forecastRate;
                
                let forecastDiv = forecastAsset * terminalDivYield;
                forecastTotalDiv += forecastDiv; 
                
                let forecastYOC = (forecastDiv / forecastCapitalInjected) * 100;

                forecastTableHtml += `
                    <tr class="hover:bg-emerald-50/50 transition border-b border-gray-100">
                        <td class="py-2.5 px-4 font-bold text-gray-800">${fy}</td>
                        <td class="py-2.5 px-4 text-emerald-700 font-semibold">${fmtUsd(forecastAsset)}</td>
                        <td class="py-2.5 px-4 text-[#d4af37] font-semibold">${fmtUsd(forecastDiv)}</td>
                        <td class="py-2.5 px-4 text-blue-700">${fmtUsd(forecastTotalDiv)}</td>
                        <td class="py-2.5 px-4 font-bold ${forecastYOC >= 10 ? 'text-red-500' : 'text-emerald-700'}">${forecastYOC.toFixed(2)}%</td>
                    </tr>
                `;
            }
            document.getElementById('forecastTableBody').innerHTML = forecastTableHtml;
        }

        window.onload = () => { renderEtfGrid(); runBacktestEngine(); };
    </script>
